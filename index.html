<!DOCTYPE html>
<html>

<head>

<title>Smart Desk Buddy Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
font-family: 'Inter', sans-serif;
color:#e2e8f0;
margin:0;
}

/* Header */
.header{
text-align:center;
padding:30px 10px;
}

.header h1{
font-size:32px;
font-weight:600;
letter-spacing:1px;
}

.header p{
color:#94a3b8;
margin-top:5px;
}

/* Cards */
.card{
background: rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.08);
box-shadow: 0 8px 25px rgba(0,0,0,0.25);
transition:0.3s;
}

.card:hover{
transform: translateY(-3px);
}

h5{
color:#94a3b8;
font-size:14px;
letter-spacing:0.5px;
}

h4{
color:#e2e8f0;
font-weight:500;
}

/* Focus Text */
.focus{
font-size:30px;
font-weight:600;
margin-top:10px;
}

.focused{
color:#22c55e;
}

.distracted{
color:#ef4444;
}

/* Numbers */
#confidence, #hr{
font-size:22px;
font-weight:500;
margin-top:10px;
}

.summary{
font-size:26px;
font-weight:600;
margin-top:10px;
}

/* Chart */
#chart{
height:260px !important;
}

/* Layout spacing */
.row{
gap:15px;
}

.container{
max-width:1100px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Smart Desk Buddy</h1>
<p>Focus Monitoring Dashboard</p>
</div>

<div class="row text-center">

<div class="col-md">
<div class="card p-4">
<h5>Focus State</h5>
<div id="focus" class="focus">Loading...</div>
</div>
</div>

<div class="col-md">
<div class="card p-4">
<h5>Confidence</h5>
<div id="confidence">-</div>
</div>
</div>

<div class="col-md">
<div class="card p-4">
<h5>Heart Rate</h5>
<div id="hr">-</div>
</div>
</div>

</div>

<br>

<div class="row text-center">

<div class="col-md">
<div class="card p-4">
<h5>Focused Sessions</h5>
<div id="focusCount" class="summary">-</div>
</div>
</div>

<div class="col-md">
<div class="card p-4">
<h5>Distracted Sessions</h5>
<div id="distractCount" class="summary">-</div>
</div>
</div>

</div>

<br>

<div class="card p-4">

<h4 class="text-center mb-3">Focus Confidence Trend</h4>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let chart;

async function loadData(){

try{

const response = await fetch("http://127.0.0.1:5000/focus_history");
const data = await response.json();

if(!data || data.length === 0) return;

const latest = data[0];

document.getElementById("focus").innerText = latest.prediction;

if(latest.prediction === "Focused")
document.getElementById("focus").className="focus focused";
else
document.getElementById("focus").className="focus distracted";

document.getElementById("confidence").innerText =
(latest.confidence*100).toFixed(1) + "%";

document.getElementById("hr").innerText =
latest.hr_mean + " bpm";

let focusCount = 0;
let distractCount = 0;

data.forEach(d=>{
if(d.prediction === "Focused")
focusCount++;
else
distractCount++;
});

document.getElementById("focusCount").innerText = focusCount;
document.getElementById("distractCount").innerText = distractCount;

/* Prepare chart data */

const recentData = data.slice(0,10).reverse();

const labels = recentData.map(d=>{
const date = new Date(d.timestamp);
return date.toLocaleTimeString();
});

const focusValues = recentData.map(d=>{
if(d.prediction === "Focused")
return d.confidence*100;
else
return null;
});

const distractValues = recentData.map(d=>{
if(d.prediction === "Distracted")
return d.confidence*100;
else
return null;
});

if(chart) chart.destroy();

const ctx = document.getElementById("chart");

chart = new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Focused",
data:focusValues,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,0.2)",
borderWidth:3,
pointRadius:4,
tension:0.4
},
{
label:"Distracted",
data:distractValues,
borderColor:"#ef4444",
backgroundColor:"rgba(239,68,68,0.2)",
borderWidth:3,
pointRadius:4,
tension:0.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
labels:{
color:"#cbd5f5"
}
}
},
scales:{
x:{
ticks:{color:"#94a3b8"}
},
y:{
min:0,
max:100,
ticks:{
color:"#94a3b8",
callback:function(value){
return value + "%";
}
}
}
}
}
});

}catch(error){
console.error("Error loading data:",error);
}

}

loadData();

setInterval(loadData,3000);

</script>

</body>

</html>
