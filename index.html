<!DOCTYPE html>
<html>

<head>

<title>Smart Desk Buddy Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background: linear-gradient(135deg,#e0e7ff,#f8fafc);
font-family: 'Inter', sans-serif;
color:#1e293b;
margin:0;
}

/* Header */
.header{
text-align:center;
padding:25px 10px;
}

.header h1{
font-size:28px;
font-weight:600;
}

.header p{
color:#64748b;
margin-top:5px;
}

/* Glass Cards */
.card{
background: rgba(255,255,255,0.6);
backdrop-filter: blur(10px);
border-radius:18px;
border:1px solid rgba(255,255,255,0.4);
box-shadow: 0 6px 20px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform: translateY(-2px);
}

h5{
color:#64748b;
font-size:14px;
}

h4{
font-weight:500;
}

/* Focus */
.focus{
font-size:28px;
font-weight:600;
margin-top:8px;
}

.focused{
color:#16a34a;
}

.distracted{
color:#dc2626;
}

/* Values */
#confidence, #hr{
font-size:20px;
font-weight:500;
margin-top:8px;
}

.summary{
font-size:24px;
font-weight:600;
margin-top:8px;
}

/* Chart */
#chart{
height:250px !important;
}

/* Layout */
.row{
gap:15px;
}

.container{
max-width:1000px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Smart Desk Buddy</h1>
<p>Focus Dashboard</p>
</div>

<div class="row text-center">

<div class="col-md">
<div class="card p-3">
<h5>Focus</h5>
<div id="focus" class="focus">Loading...</div>
</div>
</div>

<div class="col-md">
<div class="card p-3">
<h5>Confidence</h5>
<div id="confidence">-</div>
</div>
</div>

<div class="col-md">
<div class="card p-3">
<h5>Heart Rate</h5>
<div id="hr">-</div>
</div>
</div>

</div>

<br>

<div class="row text-center">

<div class="col-md">
<div class="card p-3">
<h5>Focused</h5>
<div id="focusCount" class="summary">-</div>
</div>
</div>

<div class="col-md">
<div class="card p-3">
<h5>Distracted</h5>
<div id="distractCount" class="summary">-</div>
</div>
</div>

</div>

<br>

<div class="card p-4">

<h4 class="text-center mb-3">Focus Trend</h4>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let chart;

async function loadData(){

try{

const response = await fetch("http://127.0.0.1:5000/focus_history");
const data = await response.json();

if(!data || data.length === 0) return;

const latest = data[0];

document.getElementById("focus").innerText = latest.prediction;

if(latest.prediction === "Focused")
document.getElementById("focus").className="focus focused";
else
document.getElementById("focus").className="focus distracted";

document.getElementById("confidence").innerText =
(latest.confidence*100).toFixed(1) + "%";

document.getElementById("hr").innerText =
latest.hr_mean + " bpm";

let focusCount = 0;
let distractCount = 0;

data.forEach(d=>{
if(d.prediction === "Focused")
focusCount++;
else
distractCount++;
});

document.getElementById("focusCount").innerText = focusCount;
document.getElementById("distractCount").innerText = distractCount;

/* Chart Data */

const recentData = data.slice(0,10).reverse();

const labels = recentData.map(d=>{
const date = new Date(d.timestamp);
return date.toLocaleTimeString();
});

const focusValues = recentData.map(d=>{
if(d.prediction === "Focused")
return d.confidence*100;
else
return null;
});

const distractValues = recentData.map(d=>{
if(d.prediction === "Distracted")
return d.confidence*100;
else
return null;
});

if(chart) chart.destroy();

const ctx = document.getElementById("chart");

chart = new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Focused",
data:focusValues,
borderColor:"#16a34a",
backgroundColor:"rgba(22,163,74,0.15)",
borderWidth:2,
pointRadius:3,
tension:0.4
},
{
label:"Distracted",
data:distractValues,
borderColor:"#dc2626",
backgroundColor:"rgba(220,38,38,0.15)",
borderWidth:2,
pointRadius:3,
tension:0.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
labels:{color:"#475569"}
}
},
scales:{
x:{
ticks:{color:"#64748b"}
},
y:{
min:0,
max:100,
ticks:{
color:"#64748b",
callback:function(value){
return value + "%";
}
}
}
}
}
});

}catch(error){
console.error("Error loading data:",error);
}

}

loadData();
setInterval(loadData,3000);

</script>

</body>

</html>
