<!DOCTYPE html>
<html>

<head>

<title>Smart Desk Buddy Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f5f1e8;
font-family:Arial, sans-serif;
color:#4a433a;
}

.header{
text-align:center;
padding:20px;
}

.card{
border-radius:15px;
background:#faf7f2;
border:1px solid #e6dfd2;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.focus{
font-size:28px;
font-weight:bold;
}

.focused{
color:#4f8a5b;
}

.distracted{
color:#c26d5a;
}

h1,h4{
color:#6f5e46;
}

#chart{
height:250px !important;
max-height:250px;
}

.summary{
font-size:18px;
font-weight:500;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>🧠 Smart Desk Buddy</h1>
<p>AI Focus Monitoring Dashboard</p>
</div>

<div class="row text-center">

<div class="col-md-4">
<div class="card p-3">
<h5>Focus State</h5>
<div id="focus" class="focus">Loading...</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Confidence</h5>
<div id="confidence">-</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Heart Rate</h5>
<div id="hr">-</div>
</div>
</div>

</div>

<br>

<div class="row text-center">

<div class="col-md-6">
<div class="card p-3">
<h5>Today's Focus Sessions</h5>
<div id="focusCount" class="summary">-</div>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<h5>Today's Distracted Sessions</h5>
<div id="distractCount" class="summary">-</div>
</div>
</div>

</div>

<br>

<div class="card p-4">

<h4 class="text-center">Focus Confidence Trend</h4>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let chart;

async function loadData(){

try{

const response = await fetch("http://127.0.0.1:5000/focus_history");
const data = await response.json();

if(!data || data.length === 0) return;

const latest = data[0];

document.getElementById("focus").innerText = latest.prediction;

if(latest.prediction === "Focused")
document.getElementById("focus").className="focus focused";
else
document.getElementById("focus").className="focus distracted";

document.getElementById("confidence").innerText =
(latest.confidence*100).toFixed(1) + "%";

document.getElementById("hr").innerText =
latest.hr_mean + " bpm";

let focusCount = 0;
let distractCount = 0;

data.forEach(d=>{
if(d.prediction === "Focused")
focusCount++;
else
distractCount++;
});

document.getElementById("focusCount").innerText = focusCount;
document.getElementById("distractCount").innerText = distractCount;

/* Prepare chart data */

const recentData = data.slice(0,10).reverse();

const labels = recentData.map(d=>{
const date = new Date(d.timestamp);
return date.toLocaleTimeString();
});

const focusValues = recentData.map(d=>{
if(d.prediction === "Focused")
return d.confidence*100;
else
return null;
});

const distractValues = recentData.map(d=>{
if(d.prediction === "Distracted")
return d.confidence*100;
else
return null;
});

if(chart) chart.destroy();

const ctx = document.getElementById("chart");

chart = new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Focused",
data:focusValues,
borderColor:"green",
backgroundColor:"rgba(0,200,0,0.2)",
borderWidth:3,
pointRadius:5,
tension:0.4
},
{
label:"Distracted",
data:distractValues,
borderColor:"red",
backgroundColor:"rgba(255,0,0,0.2)",
borderWidth:3,
pointRadius:5,
tension:0.4
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:{
duration:1000
},
scales:{
y:{
min:0,
max:100,
ticks:{
callback:function(value){
return value + "%";
}
}
}
}
}
});

}catch(error){
console.error("Error loading data:",error);
}

}

loadData();

setInterval(loadData,3000);

</script>

</body>

</html>
